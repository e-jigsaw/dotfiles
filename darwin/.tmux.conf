# prefix は Ctrl-b
set -g prefix C-b
bind C-b send-prefix

# 端末 / カラー
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'
set -g set-clipboard on

# vi ライク
set -g status-keys vi
set -g mode-keys vi
set -g history-limit 100000
set -sg escape-time 10

# インデックス
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -s extended-keys always
set -as terminal-features 'tmux-256color:extkeys'
bind-key -n S-Enter send-keys -l $'\e[13;2u'

# 分割（カレントディレクトリ引き継ぎ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane 移動（prefix + hjkl）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane リサイズ
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# pane 最大化トグル
bind z resize-pane -Z

# カレント dir を引き継いで新規 window
bind c new-window -c "#{pane_current_path}"
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format "#{pane_current_command}"

# kill
bind x confirm-before kill-pane
bind & kill-window

# window 移動（Shift+←→を prefix なしで）
bind -n S-Left  previous-window
bind -n S-Right next-window

# セッション / ツリー
bind s choose-session
bind w choose-tree -Zw

# 設定リロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g status-interval 60
set -g status-bg "colour234"
set -g status-fg "colour250"

set -g status-left  ""
set -g status-right "#S #[fg=colour244]| #H | %Y-%m-%d %H:%M"

setw -g window-status-current-format '#[bg=colour2,fg=colour255] #I:#W '
setw -g window-status-format         '#[fg=colour244] #I:#W '
